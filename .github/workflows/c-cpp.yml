name: C/C++ CI

on:
  push:
    branches: [ "macos" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-win:

    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4


    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
        version: "6.10.2"
        arch: "win64_mingw"
        tools: 'tools_mingw1310'

    - name: Path stuff
      shell: bash
      run: echo "${{ github.workspace }}\Qt\Tools\mingw1310_64\bin" >> $GITHUB_PATH

    - name: qmake
      working-directory: ${{github.workspace}}
      run: qmake -makefile
      
    - name: make
      working-directory: ${{github.workspace}}

      run: make
    - name: deploy
      working-directory: ${{github.workspace}}/build/Release
      run: windeployqt.exe ./

    - name: upload
      uses: actions/upload-artifact@v6.0.0
      
      with:
        path: ${{github.workspace}}/build

  build-mac:

    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install Qt
      uses: jurplel/install-qt-action@v3
      with:
        aqtversion: '==3.1.*'
        version: '5.9.0'
        host: 'mac'
        target: 'desktop'
        arch: 'clang_64'         
        
    - name: qmake
   
      working-directory: ${{github.workspace}}
      run: qmake -makefile
      
    - name: make
      working-directory: ${{github.workspace}}

      run: make
    - name: deploy
      working-directory: ${{github.workspace}}/build/Release
      run: macdeployqt ./

    - name: upload
      uses: actions/upload-artifact@v6.0.0
      
      with:
        path: ${{github.workspace}}/build
        name: "macos-x64"


      

      

      

      
