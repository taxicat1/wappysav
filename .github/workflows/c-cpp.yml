name: C/C++ CI

on:
  push:
    branches: [ "macos" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-win:

    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4


    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
        version: "6.10.2"
        arch: "win64_mingw"
        tools: 'tools_mingw1310'

    - name: Path stuff
      shell: bash
      run: echo "${{ github.workspace }}\Qt\Tools\mingw1310_64\bin" >> $GITHUB_PATH

    - name: qmake
      working-directory: ${{github.workspace}}
      run: qmake -makefile
      
    - name: make
      working-directory: ${{github.workspace}}

      run: make
    - name: deploy
      working-directory: ${{github.workspace}}/build/Release
      run: windeployqt.exe ./

    - name: upload
      uses: actions/upload-artifact@v6.0.0
      
      with:
        path: ${{github.workspace}}/build
        name: "windows-x86_64"

  build-mac-old:

    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install Qt
      uses: jurplel/install-qt-action@v3
      with:
        aqtversion: '==3.1.*'
        version: '5.*.*'
        host: 'mac'
        target: 'desktop'
        arch: 'clang_64'         
        
    - name: qmake
   
      working-directory: ${{github.workspace}}
      run: qmake -makefile 
      
    - name: make
      working-directory: ${{github.workspace}}

      run: make
    - name: deploy
      working-directory: ${{github.workspace}}/build/Release
      run: macdeployqt wappysav.app

    - name: upload
      uses: actions/upload-artifact@v6.0.0
      
      with:
        path: ${{github.workspace}}/build
        name: "macos-x86_64-qt5"

  build-mac:

    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install Qt
      uses: jurplel/install-qt-action@v3
      with:
        aqtversion: '==3.1.*'
        version: '6.10.2'
        host: 'mac'
        target: 'desktop'
        arch: 'clang_64'         
        
    - name: qmake
   
      working-directory: ${{github.workspace}}
      run: qmake -makefile QMAKE_APPLE_DEVICE_ARCHS="x86_64 arm64"
      
    - name: make
      working-directory: ${{github.workspace}}

      run: make
    - name: deploy
      working-directory: ${{github.workspace}}/build/Release
      run: macdeployqt wappysav.app

    - name: upload
      uses: actions/upload-artifact@v6.0.0
      
      with:
        path: ${{github.workspace}}/build
        name: "macos-universal-qt6"
  build-linux:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install Qt
      uses: jurplel/install-qt-action@v3
      with:
        aqtversion: '==3.1.*'
        version: '6.10.2'
        host: 'linux'
        target: 'desktop'
        arch: 'linux_gcc_64'        
        
    - name: qmake
   
      working-directory: ${{github.workspace}}
      run: qmake -makefile
      
    - name: make
      working-directory: ${{github.workspace}}

      run: |
        make -j4
        make install
     
    - name: Build AppImage
      run: |
        wget https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
        wget https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
        chmod +x linuxdeploy-x86_64.AppImage
        chmod +x linuxdeploy-plugin-qt-x86_64.AppImage
        export QMAKE=${{env.REPO_DIR}}/Qt/${{env.QT_VERSION}}/gcc_64/bin/${{env.QMAKE}}
        export PATH=${{env.REPO_DIR}}/Qt/${{env.QT_VERSION}}/gcc_64/libexec:$PATH
        ./linuxdeploy-x86_64.AppImage --appdir AppDir --custom-apprun=dist/linux/AppRun --exclude-library "*libpython3*" --plugin qt --output appimage

    - name: upload
      uses: actions/upload-artifact@v6.0.0
      
      with:
        path: wappysav_Linux_x86_64.AppImage
        name: "linux-x86_64"
      
      

      

      

      
